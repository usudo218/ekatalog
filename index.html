<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Informatika</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --dark: #212121; --bg: #f5f5f5; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--white); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 700; color: var(--primary); font-size: 1.1rem; text-decoration: none; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.8rem; border: 1px solid #ddd; padding: 6px 12px; border-radius: 4px; }

        .hero { background: var(--white); padding: 30px 20px; text-align: center; margin-bottom: 10px; }
        .hero h1 { margin: 0; font-size: 1.5rem; color: var(--dark); }

        /* --- PENGATURAN GRID ALA SHOPEE --- */
        .container { 
            max-width: 1200px; 
            margin: 10px auto; 
            padding: 0 10px; 
            display: grid; 
            gap: 10px; /* Jarak antar kartu rapat ala Shopee */
            flex: 1; 
        }
        
        /* Laptop: 4 Kolom (Agar tidak terlalu kecil di layar lebar) */
        @media (min-width: 1024px) { 
            .container { grid-template-columns: repeat(4, 1fr); } 
        }

        /* Tablet & HP: Cukup 2 Kolom (Agar gambar tetap BESAR dan JELAS) */
        @media (max-width: 1023px) { 
            .container { grid-template-columns: repeat(2, 1fr); } 
        }

        /* Kartu Modul */
        .card { 
            background: var(--white); 
            border-radius: 4px; 
            overflow: hidden; 
            text-decoration: none; 
            color: inherit; 
            display: flex; 
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .card:hover { border-color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* GAMBAR KOTAK BESAR (Shopee Style) */
        .card-img { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* Kotak Sempurna */
            object-fit: cover; 
            background: #eee; 
        }

        .card-body { 
            padding: 10px; 
            flex-grow: 1; 
            background: white;
        }

        .card-body h3 { 
            font-size: 0.85rem; 
            margin: 0; 
            line-height: 1.4; 
            font-weight: 500; 
            color: #333;
            /* Potong teks jika lebih dari 2 baris */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8em; /* Menjaga tinggi kartu tetap sama */
        }

        /* Tombol Halaman */
        #pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 30px 0; }
        .btn-page { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #ddd; background: var(--white); font-weight: 600; font-size: 0.8rem; }
        .btn-page:disabled { opacity: 0.3; }
        
        footer { text-align: center; padding: 20px; color: #999; font-size: 0.75rem; background: var(--white); border-top: 1px solid #eee; }
        #loader { text-align: center; padding: 100px; font-weight: 600; color: #666; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">E-KATALOG</a>
        <nav><a href="admin.html">ADMIN</a></nav>
    </header>

    <div class="hero">
        <h1>Katalog Modul Informatika</h1>
    </div>

    <div id="loader">Memuat Modul...</div>
    <div class="container" id="katalog-container"></div>
    <div id="pagination"></div>

    <footer>&copy; 2026 Informatika</footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx4BOkoJcUkv0mHwTXIpXGWG1rqrLTifR5nY9GOv_-AmUxUu3V3GNG3ZjAtzDkuVf0m/exec";
        
        let dataUtama = [];
        let halSekarang = 1;
        const perHalaman = 8; 

        function ambilGambar(url) {
            if (url && url.includes('drive.google.com')) {
                let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                // Menggunakan ukuran 800px agar gambar tajam meski di-zoom
                return `https://drive.google.com/thumbnail?authuser=0&sz=w800&id=${id}`;
            }
            return url;
        }

        async function muatData() {
            try {
                const response = await fetch(API_URL + "?v=" + Math.random());
                dataUtama = await response.json();
                document.getElementById('loader').style.display = 'none';
                tampilkanKatalog();
            } catch (error) {
                document.getElementById('loader').innerText = "Gagal memuat data.";
            }
        }

        function tampilkanKatalog() {
            const wadah = document.getElementById('katalog-container');
            wadah.innerHTML = ""; 

            const mulai = (halSekarang - 1) * perHalaman;
            const selesai = mulai + perHalaman;
            const potonganData = dataUtama.slice(mulai, selesai);

            potonganData.forEach(item => {
                wadah.innerHTML += `
                    <a href="detail.html?id=${item.id}" class="card">
                        <img src="${ambilGambar(item.gambar)}" class="card-img" onerror="this.src='https://via.placeholder.com/400x400?text=No+Image'">
                        <div class="card-body"><h3>${item.judul}</h3></div>
                    </a>
                `;
            });

            const totalHalaman = Math.ceil(dataUtama.length / perHalaman);
            const navigasi = document.getElementById('pagination');
            
            if (totalHalaman > 1) {
                navigasi.innerHTML = `
                    <button class="btn-page" onclick="pindahHalaman(-1)" ${halSekarang === 1 ? 'disabled' : ''}>PREV</button>
                    <span style="font-size:0.8rem; font-weight:600">${halSekarang} / ${totalHalaman}</span>
                    <button class="btn-page" onclick="pindahHalaman(1)" ${halSekarang === totalHalaman ? 'disabled' : ''}>NEXT</button>
                `;
            } else { navigasi.innerHTML = ""; }
        }

        function pindahHalaman(arah) {
            halSekarang += arah;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            tampilkanKatalog();
        }

        muatData();
    </script>
</body>
</html>
