<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Modul</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .head { background: #d32f2f; color: white; padding: 20px; text-align: center; }
        .main { padding: 30px; }
        .back-link { text-decoration: none; color: #d32f2f; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        .grid { display: flex; gap: 30px; flex-wrap: wrap; }
        .img-box { flex: 1; min-width: 250px; }
        .img-box img { width: 100%; border-radius: 8px; border: 1px solid #eee; }
        .info-box { flex: 2; min-width: 300px; }
        .btn-group { margin-top: 25px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; text-align: center; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-green { background: #34a853; color: white; }
        #pdf-viewer { width: 100%; height: 600px; margin-top: 25px; border: 1px solid #ddd; display: none; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="head"><h1 id="jdl">Memuat...</h1></div>
        <div class="main">
            <a href="index.html" class="back-link">← Kembali ke Katalog</a>
            <div class="grid">
                <div class="img-box"><img id="gbr" src=""></div>
                <div class="info-box">
                    <h2 id="jdl2">Judul</h2>
                    <p id="dsk">Deskripsi...</p>
                    <div class="btn-group">
                        <button class="btn btn-blue" onclick="showPdf()">Baca Online</button>
                        <a id="down" href="#" class="btn btn-green" download>Unduh PDF</a>
                    </div>
                </div>
            </div>
            <iframe id="pdf-viewer" src=""></iframe>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwnrFRTd787WIMq9bMBfX8M6jbYWsYmvDSYsGPN-KrEAW47lajpSA12WTK0OYSvTrQK/exec";
        const id = new URLSearchParams(window.location.search).get('id');

        function fixDriveLink(url) {
            if (url.includes('drive.google.com')) {
                let idFile = url.includes('id=') ? url.split('id=')[1].split('&')[0] : url.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/uc?export=view&id=${idFile}`;
            }
            return url;
        }

        async function loadDetail() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const item = data.find(x => x.id === id);
            if (item) {
                document.getElementById('jdl').innerText = item.judul;
                document.getElementById('jdl2').innerText = item.judul;
                document.getElementById('dsk').innerText = item.deskripsi;
                document.getElementById('gbr').src = fixDriveLink(item.gambar);
                document.getElementById('down').href = fixDriveLink(item.filepdf);
                document.getElementById('pdf-viewer').src = fixDriveLink(item.filepdf);
            }
        }
        function showPdf() { 
            document.getElementById('pdf-viewer').style.display = 'block';
            window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
        }
        loadDetail();
    </script>
</body>
</html>
