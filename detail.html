<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Modul</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .main-container { max-width: 900px; margin: auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { background: #d32f2f; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; display: flex; gap: 30px; flex-wrap: wrap; }
        .cover-area { flex: 1; min-width: 280px; }
        .cover-area img { width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .desc-area { flex: 2; min-width: 300px; }
        .desc-area h2 { margin-top: 0; color: #2c3e50; }
        .desc-area p { color: #555; line-height: 1.6; }
        .action-btns { margin-top: 30px; display: flex; gap: 10px; }
        .btn { padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; flex: 1; text-align: center; }
        .btn-read { background: #007bff; color: white; }
        .btn-down { background: #28a745; color: white; }
        .btn-back { background: #666; color: white; width: fit-content; margin-bottom: 20px; display: inline-block; padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; }
        #pdf-frame { width: 100%; height: 600px; border: 1px solid #ddd; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header"><h1 id="title">Memuat...</h1></div>
        
        <div class="content">
            <a href="index.html" class="btn-back">← Kembali ke Katalog</a>
            <div style="width:100%; display:flex; gap:30px; flex-wrap:wrap;">
                <div class="cover-area">
                    <img id="coverImg" src="" alt="Cover">
                </div>
                <div class="desc-area">
                    <h2 id="subTitle">Judul Modul</h2>
                    <p id="description">Deskripsi sedang dimuat...</p>
                    <div class="action-btns">
                        <button class="btn btn-read" onclick="showPdf()">Baca Online</button>
                        <a id="downLink" href="#" class="btn btn-down" download>Download PDF</a>
                    </div>
                </div>
            </div>
            
            <iframe id="pdf-frame" src=""></iframe>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwnrFRTd787WIMq9bMBfX8M6jbYWsYmvDSYsGPN-KrEAW47lajpSA12WTK0OYSvTrQK/exec"; // GANTI INI
        const params = new URLSearchParams(window.location.search);
        const docId = params.get('id');

        function fixDriveLink(url) {
            if (url.includes('drive.google.com')) {
                let id = "";
                if (url.includes('id=')) {
                    id = url.split('id=')[1].split('&')[0];
                } else {
                    id = url.split('/d/')[1].split('/')[0];
                }
                return `https://drive.google.com/uc?export=view&id=${id}`;
            }
            return url;
        }

        async function loadDetail() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const item = data.find(x => x.id === docId);

                if (item) {
                    document.getElementById('title').innerText = item.judul;
                    document.getElementById('subTitle').innerText = item.judul;
                    document.getElementById('description').innerText = item.deskripsi;
                    
                    const imgUrl = fixDriveLink(item.gambar);
                    const pdfUrl = fixDriveLink(item.filepdf);
                    
                    document.getElementById('coverImg').src = imgUrl;
                    document.getElementById('downLink').href = pdfUrl;
                    document.getElementById('pdf-frame').src = pdfUrl;
                }
            } catch (err) {
                console.error("Gagal memuat detail.");
            }
        }

        function showPdf() {
            const frame = document.getElementById('pdf-frame');
            frame.style.display = 'block';
            frame.scrollIntoView({ behavior: 'smooth' });
        }

        loadDetail();
    </script>
</body>
</html>
